<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e7490">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="螺牙查詢">
<title>螺牙管件查詢圖鑑</title>
<style>
  :root{
    --bg:#f4f6f8; --panel:#ffffff; --ink:#1e293b; --muted:#64748b;
    --line:#d8dee6; --accent:#0e7490;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow:hidden;}
  body{
    font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    display:flex; flex-direction:column;
  }
  /* ── 工具列 ── */
  header{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:8px 14px; background:var(--panel); border-bottom:1px solid var(--line);
    z-index:5;
  }
  header h1{font-size:17px; white-space:nowrap;}
  header .hint{font-size:12px; color:var(--muted); white-space:nowrap;}
  #search{
    flex:1 1 160px; min-width:140px; max-width:300px;
    padding:6px 10px; border:1px solid var(--line); border-radius:6px; font-size:14px;
  }
  .chip{
    padding:5px 10px; border:1px solid var(--line); border-radius:14px;
    background:#fff; font-size:13px; cursor:pointer; user-select:none; white-space:nowrap;
  }
  .chip.on{color:#fff;}
  .zbtn{
    width:32px; height:32px; border:1px solid var(--line); border-radius:6px;
    background:#fff; font-size:16px; cursor:pointer;
  }
  .zbtn:hover{background:#eef2f6;}
  /* ── 主區 ── */
  main{flex:1; display:flex; min-height:0;}
  #stage{flex:1; position:relative; min-width:0;}
  #canvas{width:100%; height:100%; display:block; cursor:grab; touch-action:none;}
  #canvas.dragging{cursor:grabbing;}
  /* ── 說明欄 ── */
  aside{
    width:330px; flex:none; background:var(--panel); border-left:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0;
  }
  .tabs{display:flex; border-bottom:1px solid var(--line);}
  .tabs button{
    flex:1; padding:9px 4px; border:none; background:none; font-size:14px;
    cursor:pointer; color:var(--muted); border-bottom:2px solid transparent;
  }
  .tabs button.on{color:var(--accent); border-bottom-color:var(--accent); font-weight:bold;}
  .tabbody{flex:1; overflow-y:auto; padding:14px; font-size:14px; line-height:1.7;}
  .tabbody h3{font-size:15px; margin:14px 0 4px; color:var(--accent);}
  .tabbody h3:first-child{margin-top:0;}
  .tabbody table{width:100%; border-collapse:collapse; font-size:13px; margin:6px 0;}
  .tabbody td,.tabbody th{border:1px solid var(--line); padding:4px 6px; text-align:left; vertical-align:top;}
  .tabbody th{background:#f1f5f9; white-space:nowrap;}
  .tabbody .big{font-size:20px; font-weight:bold;}
  .tabbody .tag{
    display:inline-block; padding:1px 8px; border-radius:10px; color:#fff;
    font-size:12px; margin-left:6px; vertical-align:middle;
  }
  .tabbody .dim{color:var(--muted); font-size:12px;}
  .placeholder{color:var(--muted); text-align:center; margin-top:40px;}
  @media (max-width:760px){
    main{flex-direction:column;}
    aside{width:100%; height:42%; border-left:none; border-top:1px solid var(--line);}
  }
  /* ── 尺寸詳圖檢視器 ── */
  #viewer3d{
    position:fixed; inset:0; z-index:50; display:none; flex-direction:column;
    background:#eef2f6; color:#1e293b;
  }
  #viewer3d.open{display:flex;}
  #v3dbar{
    position:sticky; top:0; z-index:2; flex:none;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:10px 16px; background:#0f172a; color:#e2e8f0;
  }
  #v3dtitle{font-size:19px; font-weight:bold;}
  #v3dtag{display:inline-block; padding:2px 11px; border-radius:11px; font-size:13px; color:#fff; font-weight:bold;}
  #v3dinfo{font-size:12.5px; color:#94a3b8; flex:1 1 200px;}
  #v3dclose{
    margin-left:auto; min-width:46px; min-height:44px; padding:6px 16px;
    border:1px solid #475569; border-radius:8px; background:#1e293b; color:#e2e8f0;
    font-size:15px; cursor:pointer;
  }
  #v3dclose:hover{background:#334155;}
  #v3dscroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  #v3dhero{
    display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
    padding:12px 14px; background:#fff; border-bottom:1px solid #e2e8f0;
  }
  .herocell{background:#f8fafc; border:1px solid #e6ebf1; border-radius:10px; padding:9px 6px; text-align:center;}
  .herocell .lab{font-size:12px; color:#64748b; margin-bottom:3px;}
  .herocell .val{font-size:23px; font-weight:bold; line-height:1.1;}
  .herocell .sub{font-size:11px; color:#94a3b8; margin-top:2px;}
  #v3dviews{display:flex; gap:8px; padding:12px 14px 2px;}
  #v3dviews button{
    flex:1; min-height:46px; border:1px solid #cbd5e1; border-radius:9px;
    background:#fff; color:#334155; font-size:15px; font-weight:bold; cursor:pointer;
  }
  #v3dprofilewrap{padding:8px 12px 6px;}
  #v3dprofile svg{width:100%; height:auto; display:block; background:#fff;
    border:1px solid #e2e8f0; border-radius:10px;}
  #v3dlegend{display:flex; flex-wrap:wrap; gap:8px 16px; padding:10px 16px; font-size:12.5px; color:#475569;}
  #v3dlegend span::before{content:''; display:inline-block; width:12px; height:12px;
    border-radius:3px; margin-right:5px; vertical-align:-1px; background:var(--c);}
  #v3dtable{width:calc(100% - 28px); margin:2px 14px 22px; border-collapse:collapse; font-size:13px; background:#fff;}
  #v3dtable th,#v3dtable td{border:1px solid #e2e8f0; padding:5px 8px; text-align:left; vertical-align:top;}
  #v3dtable th{background:#f1f5f9; white-space:nowrap;}
  #v3dsolid{padding:10px 12px 26px;}
  #v3dcanvas{width:100%; height:56vh; display:block; background:#0f172a;
    border-radius:10px; touch-action:none; cursor:grab;}
  #v3dsolidnote{text-align:center; font-size:12px; color:#64748b; padding:9px 8px 0;}
  @media (min-width:640px){ #v3dhero{grid-template-columns:repeat(5,1fr);} }
  .btn3d{
    margin:8px 0; padding:9px 16px; border:none; border-radius:8px;
    background:var(--accent); color:#fff; font-size:15px; font-weight:bold; cursor:pointer;
  }
  .btn3d:hover{opacity:0.9;}
  /* ── SVG 卡片 ── */
  .card{cursor:pointer;}
  .card rect.box{fill:#fff; stroke-width:1.5; rx:10;}
  .card.dimmed{opacity:0.12;}
  .card.selected rect.box{stroke-width:4;}
  text{user-select:none;}
</style>
</head>
<body>
<header>
  <h1>🔩 螺牙管件查詢圖鑑</h1>
  <input id="search" type="search" placeholder="搜尋：4分、1/2、21、M10、NPT…">
  <span id="chips"></span>
  <button class="zbtn" id="zin"  title="放大">＋</button>
  <button class="zbtn" id="zout" title="縮小">－</button>
  <button class="zbtn" id="zfit" title="全覽">⛶</button>
  <span class="hint">滾輪縮放｜拖曳平移｜點卡片看說明</span>
</header>
<main>
  <div id="stage"><svg id="canvas"><g id="world"></g></svg></div>
  <aside>
    <div class="tabs">
      <button data-tab="spec" class="on">規格說明</button>
      <button data-tab="mat">材質／密封</button>
      <button data-tab="id">怎麼分辨</button>
    </div>
    <div class="tabbody" id="panelBody"></div>
  </aside>
</main>

<div id="viewer3d">
  <div id="v3dbar">
    <span id="v3dtitle"></span>
    <span id="v3dtag"></span>
    <span id="v3dinfo"></span>
    <button id="v3dclose">✕ 關閉</button>
  </div>
  <div id="v3dscroll">
    <div id="v3dhero"></div>
    <div id="v3dviews">
      <button data-view="profile" class="on">📐 牙型剖面詳圖</button>
      <button data-view="solid">🧊 立體牙紋</button>
    </div>
    <div id="v3dprofilewrap">
      <div id="v3dprofile"></div>
      <div id="v3dlegend">
        <span style="--c:#2563eb">直徑</span>
        <span style="--c:#ea580c">牙距</span>
        <span style="--c:#16a34a">牙型／牙角</span>
        <span style="--c:#9333ea">錐度</span>
        <span style="--c:#64748b">軸線／資訊</span>
      </div>
      <table id="v3dtable"></table>
    </div>
    <div id="v3dsolid" style="display:none">
      <canvas id="v3dcanvas"></canvas>
      <div id="v3dsolidnote"></div>
      <div id="v3dhint" style="text-align:center;color:#64748b;font-size:12px;padding:6px">拖曳＝旋轉｜滾輪／雙指＝縮放｜放開自動慢轉</div>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   資料區 —— 尺寸依據：
   BSPT/BSPP: ISO 228 / BS 21 / JIS B0202-0203
   NPT: ASME B1.20.1
   公制: ISO 261/262（底孔＝外徑−牙距）
   UNC/UNF: ASME B1.1
   底孔標「約」者為業界慣用參考值，攻牙前請依材質微調
   ============================================================ */

// 管件牙共用：吋別 → 台灣俗稱
const PIPE_ALIAS = {
  '1/8':'1分','1/4':'2分','3/8':'3分','1/2':'4分','3/4':'6分','1':'1吋',
  '1-1/4':'吋2（1吋2分）','1-1/2':'吋半（1吋半）','2':'2吋','2-1/2':'2吋半','3':'3吋','4':'4吋'
};
// BSPT/BSPP 大徑（兩者同一系列）
const BSP = [
  {size:'1/8',  od:9.728,  tpi:28},
  {size:'1/4',  od:13.157, tpi:19},
  {size:'3/8',  od:16.662, tpi:19},
  {size:'1/2',  od:20.955, tpi:14},
  {size:'3/4',  od:26.441, tpi:14},
  {size:'1',    od:33.249, tpi:11},
  {size:'1-1/4',od:41.910, tpi:11},
  {size:'1-1/2',od:47.803, tpi:11},
  {size:'2',    od:59.614, tpi:11},
  {size:'2-1/2',od:75.184, tpi:11},
  {size:'3',    od:87.884, tpi:11},
  {size:'4',    od:113.030,tpi:11},
];
const RC_DRILL  = {'1/8':8.4,'1/4':11.2,'3/8':14.7,'1/2':18.4,'3/4':23.8,'1':30.0,'1-1/4':38.6,'1-1/2':44.6,'2':56.4};
const NPT_DRILL = {'1/8':8.7,'1/4':11.1,'3/8':14.5,'1/2':17.9,'3/4':23.0,'1':28.9,'1-1/4':37.7,'1-1/2':43.5,'2':55.6};
const NPT = [
  {size:'1/8',  od:10.287, tpi:27},
  {size:'1/4',  od:13.716, tpi:18},
  {size:'3/8',  od:17.145, tpi:18},
  {size:'1/2',  od:21.336, tpi:14},
  {size:'3/4',  od:26.670, tpi:14},
  {size:'1',    od:33.401, tpi:11.5},
  {size:'1-1/4',od:42.164, tpi:11.5},
  {size:'1-1/2',od:48.260, tpi:11.5},
  {size:'2',    od:60.325, tpi:11.5},
  {size:'2-1/2',od:73.025, tpi:8},
  {size:'3',    od:88.900, tpi:8},
  {size:'4',    od:114.300,tpi:8},
];
const METRIC = [ // [外徑, 粗牙距, 常見細牙]
  [3,0.5,''],[4,0.7,''],[5,0.8,''],[6,1.0,''],[8,1.25,'1.0'],
  [10,1.5,'1.25 / 1.0'],[12,1.75,'1.5 / 1.25'],[14,2.0,'1.5'],[16,2.0,'1.5'],
  [18,2.5,'1.5'],[20,2.5,'1.5 / 2.0'],[22,2.5,'1.5'],[24,3.0,'2.0'],
  [27,3.0,'2.0'],[30,3.5,'2.0'],
];
const UNIFIED = [ // [名稱, 外徑mm, UNC牙數, UNF牙數, UNC底孔, 俗稱]
  ['#4',   2.845, 40, 48, 2.26, ''],
  ['#6',   3.505, 32, 40, 2.71, ''],
  ['#8',   4.166, 32, 36, 3.45, ''],
  ['#10',  4.826, 24, 32, 3.80, ''],
  ['1/4"', 6.350, 20, 28, 5.11, '2分牙'],
  ['5/16"',7.938, 18, 24, 6.53, '2分半牙'],
  ['3/8"', 9.525, 16, 24, 7.94, '3分牙'],
  ['7/16"',11.112,14, 20, 9.35, '3分半牙'],
  ['1/2"', 12.700,13, 20, 10.80,'4分牙'],
  ['9/16"',14.288,12, 18, 12.20,'4分半牙'],
  ['5/8"', 15.875,11, 18, 13.50,'5分牙'],
  ['3/4"', 19.050,10, 16, 16.50,'6分牙'],
  ['7/8"', 22.225, 9, 14, 19.50,'7分牙'],
  ['1"',   25.400, 8, 12, 22.25,'8分牙（1吋牙）'],
];

const fmt = n => (Math.round(n*1000)/1000).toString();
const pitchOf = tpi => 25.4/tpi;

// 組出統一的卡片資料結構
const GROUPS = [
  {
    key:'PT', color:'#0e7490', bg:'#ecfeff',
    title:'PT 錐牙（BSPT／R・Rc）',
    sub:'牙角 55°｜錐度 1:16｜ISO 7 / JIS B0203',
    seal:'牙本身密封：纏生料帶（止洩帶）或塗密封膏後鎖緊',
    note:'台灣、日本水電管件的主流牙。外牙叫 R（舊稱 PT 公牙），內牙叫 Rc。與 NPT「不能」互鎖：牙角 55° vs 60° 不同。',
    use:'水管、空壓管路、瓦斯、消防管件（台日規設備）',
    items: BSP.map(b => ({
      name:`PT ${b.size}"`, alias:PIPE_ALIAS[b.size], od:b.od, odIn:b.od/25.4,
      tpi:b.tpi, pitch:pitchOf(b.tpi), drill:RC_DRILL[b.size]||null,
      taper:'錐牙 1:16', desig:`R ${b.size}（外牙）／ Rc ${b.size}（內牙）`,
    })),
  },
  {
    key:'PF', color:'#7c3aed', bg:'#f5f3ff',
    title:'PF 直牙（BSPP／G）',
    sub:'牙角 55°｜平行牙｜ISO 228 / JIS B0202',
    seal:'牙不密封：靠平墊圈、O 環或組合墊圈壓在端面密封',
    note:'和 PT 同一系列的外徑與牙數，但牙是平行的。舊 JIS 叫 PF，ISO 叫 G。壓力錶、油壓氣動接頭常用。G 外牙可鎖 Rc 內牙應急，但反過來 R 外牙鎖 G 內牙不密封。',
    use:'壓力錶（G1/4、G1/2）、油壓／氣動接頭、軟管牙口',
    items: BSP.map(b => ({
      name:`PF ${b.size}"`, alias:PIPE_ALIAS[b.size], od:b.od, odIn:b.od/25.4,
      tpi:b.tpi, pitch:pitchOf(b.tpi), drill:Math.round((b.od-pitchOf(b.tpi))*10)/10,
      taper:'平行（直牙）', desig:`G ${b.size}`,
    })),
  },
  {
    key:'NPT', color:'#b45309', bg:'#fffbeb',
    title:'NPT 美規錐牙',
    sub:'牙角 60°｜錐度 1:16｜ASME B1.20.1',
    seal:'牙本身密封：生料帶或密封膏（NPTF 乾式牙可免）',
    note:'美規設備、美製機台的管牙。1/2" 與 3/4" 的牙數和 PT 一樣是 14 TPI，最容易搞混——差在牙角 60°（PT 是 55°），硬鎖會漏。',
    use:'美規機台、化工設備、美製閥件儀錶',
    items: NPT.map(b => ({
      name:`NPT ${b.size}"`, alias:`美規${PIPE_ALIAS[b.size]}`, od:b.od, odIn:b.od/25.4,
      tpi:b.tpi, pitch:pitchOf(b.tpi), drill:NPT_DRILL[b.size]||null,
      taper:'錐牙 1:16', desig:`${b.size}-${b.tpi} NPT`,
    })),
  },
  {
    key:'M', color:'#15803d', bg:'#f0fdf4',
    title:'公制螺紋 M（粗牙／細牙）',
    sub:'牙角 60°｜平行牙｜ISO 261 / 262',
    seal:'機械固定用，不做流體密封；防鬆用彈簧墊圈、螺絲膠',
    note:'機械螺絲、螺栓的主流。標法 M外徑×牙距，例 M10×1.5。不寫牙距就是粗牙。底孔＝外徑−牙距（例 M10 粗牙底孔 8.5）。',
    use:'機械組裝、螺栓螺帽、設備固定',
    items: METRIC.map(([d,p,fine]) => ({
      name:`M${d}`, alias: fine ? `細牙 ×${fine}` : '', od:d, odIn:d/25.4,
      tpi:25.4/p, pitch:p, drill:Math.round((d-p)*100)/100,
      taper:'平行（直牙）', desig:`M${d}×${p}${fine?`（細牙 M${d}×${fine}）`:''}`,
    })),
  },
  {
    key:'UN', color:'#be123c', bg:'#fff1f2',
    title:'美制統一螺紋 UNC／UNF',
    sub:'牙角 60°｜平行牙｜ASME B1.1',
    seal:'機械固定用，不做流體密封',
    note:'美規機械螺絲。UNC 粗牙、UNF 細牙，標法「外徑-牙數」例 1/4-20 UNC。和公制 M 不能混用（M6 vs 1/4" 外徑只差 0.35mm，最常鎖錯）。',
    use:'美規設備維修、進口機械、汽機車',
    items: UNIFIED.map(([nm,od,unc,unf,drill,alias]) => ({
      name:`${nm}-${unc}`, alias, od, odIn:od/25.4,
      tpi:unc, pitch:25.4/unc, drill,
      taper:'平行（直牙）', desig:`${nm}-${unc} UNC ／ ${nm}-${unf} UNF`,
      extra:`UNF 細牙：${unf} TPI（牙距 ${fmt(Math.round(25.4/unf*1000)/1000)} mm）`,
    })),
  },
];

const MATERIALS = [
  ['不鏽鋼 SUS304（白鐵）','最通用。耐鏽，水路、空壓、一般環境都可。台灣說「白鐵管件」多半指 304。'],
  ['不鏽鋼 SUS316','加鉬、更耐蝕。海邊、化學藥劑、食品廠選 316／316L。'],
  ['黃銅（C3604 等）','水路閥件、快速接頭、錶類牙口。易加工、不生鏽鏽垢；怕氨氣、海水久了會脫鋅。'],
  ['碳鋼黑鐵（黑管）','消防、蒸氣、瓦斯配管。強度高但會鏽，外露要油漆。'],
  ['鍍鋅鐵 GIP','黑鐵鍍鋅防鏽，一般給水、風管配管。焊接處鍍層會失效。'],
  ['PVC／CPVC 塑膠','冷水、排水、電管。便宜不生鏽；不耐熱不耐壓，牙口過鎖會裂。'],
  ['尼龍／POM 塑膠接頭','氣動快插接頭常見，輕、便宜，限低壓氣體。'],
];
const SEALS = [
  ['生料帶（PTFE 止洩帶）','錐牙（PT／NPT）標配。順鎖緊方向纏 3～5 圈，牙口第一牙留空避免帶屑進管路。'],
  ['液態密封膠（厭氧膠）','取代生料帶，適合震動環境；固化需時間。'],
  ['麻絲＋密封膏','傳統工法，大口徑鑄鐵管件仍會用。'],
  ['平墊圈／O 環／組合墊圈','直牙（PF／G）唯一正解——牙本身不密封，靠端面壓墊圈。'],
];

/* ============================================================
   SVG 佈局與繪製
   ============================================================ */
const SVGNS = 'http://www.w3.org/2000/svg';
const world = document.getElementById('world');
const svg   = document.getElementById('canvas');
const SCALE = 1.5;          // px / mm（圓依真實比例）
const PAD = 60, CARD_GAP = 22, GROUP_GAP = 70, TEXT_H = 128;

function el(tag, attrs, parent){
  const e = document.createElementNS(SVGNS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(e);
  return e;
}
function txt(parent, x, y, str, size, opts={}){
  const t = el('text', {x, y, 'font-size':size, fill:opts.fill||'#1e293b',
    'font-weight':opts.bold?'bold':'normal', 'text-anchor':opts.anchor||'start'}, parent);
  t.textContent = str;
  return t;
}

let worldW = 0, worldH = 0;
const cardIndex = [];   // {g, item, group} 供搜尋/點選

function render(){
  world.innerHTML = '';
  cardIndex.length = 0;
  let y = PAD;
  worldW = 0;

  for(const grp of GROUPS){
    if(!grp.visible) continue;
    // 群組標題
    txt(world, PAD, y+30, grp.title, 30, {bold:true, fill:grp.color});
    txt(world, PAD, y+58, `${grp.sub}　密封：${grp.seal}`, 15, {fill:'#64748b'});
    y += 78;

    // 卡片列
    let x = PAD, rowH = 0;
    for(const item of grp.items){
      const d = item.od * SCALE;
      const cw = Math.max(196, d + 44);
      const ch = TEXT_H + Math.max(64, d + 34);
      rowH = Math.max(rowH, ch);

      const g = el('g', {class:'card', transform:`translate(${x},${y})`}, world);
      el('rect', {class:'box', width:cw, height:ch, rx:10, fill:grp.bg, stroke:grp.color}, g);

      // 文字區
      txt(g, 12, 26, item.name, 19, {bold:true, fill:grp.color});
      if(item.alias) txt(g, 12, 46, item.alias, 14, {bold:true, fill:'#334155'});
      txt(g, 12, 68,  `外徑 ${fmt(item.od)} mm（${item.odIn.toFixed(3)}"）`, 12.5);
      txt(g, 12, 86,  `牙數 ${fmt(item.tpi)} TPI｜牙距 ${fmt(Math.round(item.pitch*1000)/1000)} mm`, 12.5);
      txt(g, 12, 104, item.drill ? `底孔 約 ${fmt(item.drill)} mm` : '底孔 —（大口徑少攻牙）', 12.5);
      txt(g, 12, 122, item.taper, 12.5, {fill:'#64748b'});

      // 真實比例圓（外徑實線＋牙底虛線）
      const cy = TEXT_H + Math.max(32, d/2 + 17);
      const cx = cw/2;
      el('circle', {cx, cy, r:d/2, fill:'none', stroke:grp.color, 'stroke-width':2}, g);
      const minor = Math.max(0, item.od - 1.2*item.pitch) * SCALE;
      if(minor > 4) el('circle', {cx, cy, r:minor/2, fill:'none', stroke:grp.color,
        'stroke-width':1, 'stroke-dasharray':'4 3', opacity:0.55}, g);
      // 直徑標線
      el('line', {x1:cx-d/2, y1:cy, x2:cx+d/2, y2:cy, stroke:grp.color, 'stroke-width':1, opacity:0.5}, g);
      txt(g, cx, cy - d/2 - 6, `⌀${fmt(item.od)}`, 11, {anchor:'middle', fill:grp.color});

      cardIndex.push({g, item, group:grp});
      // 點選在 pointerup 統一處理（click 事件會被 pointer capture 改派，不可靠）

      x += cw + CARD_GAP;
    }
    worldW = Math.max(worldW, x + PAD);
    y += rowH + GROUP_GAP;
  }
  worldH = y + PAD;
  applyFilter();
}

/* ── 平移縮放 ── */
let tx=0, ty=0, k=1;
function apply(){ world.setAttribute('transform', `translate(${tx},${ty}) scale(${k})`); }
function fit(){
  const vw = svg.clientWidth, vh = svg.clientHeight;
  if(vw < 50 || vh < 50){ requestAnimationFrame(fit); return; } // 版面尚未排好時重試
  k = Math.min(vw/worldW, vh/worldH) * 0.97;
  tx = (vw - worldW*k)/2;
  ty = (vh - worldH*k)/2;
  apply();
}
function zoomAt(px, py, factor){
  const nk = Math.min(8, Math.max(0.02, k*factor));
  tx = px - (px-tx)*(nk/k);
  ty = py - (py-ty)*(nk/k);
  k = nk; apply();
}
// 座標一律用 clientX/Y − 容器 rect：offsetX 會隨事件目標（卡片子元素/捕捉元素）改變基準，
// 真實手勢下會亂跳；click 事件會被 pointer capture 改派到 svg，所以點選改在 pointerup 判定。
const svgPos = e => {
  const r = svg.getBoundingClientRect();
  return {x: e.clientX - r.left, y: e.clientY - r.top};
};
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const p = svgPos(e);
  zoomAt(p.x, p.y, Math.exp(-e.deltaY*0.0012));
}, {passive:false});

const pointers = new Map();
let moved = false, pinchDist = 0, downCard = null;
svg.addEventListener('pointerdown', e => {
  try{ svg.setPointerCapture(e.pointerId); }catch(_){ /* 部分環境會丟例外，不影響拖曳 */ }
  pointers.set(e.pointerId, svgPos(e));
  if(pointers.size === 1){
    moved = false;
    downCard = e.target && e.target.closest ? e.target.closest('g.card') : null;
  }
  svg.classList.add('dragging');
  if(pointers.size === 2){
    const [a,b] = [...pointers.values()];
    pinchDist = Math.hypot(a.x-b.x, a.y-b.y);
    downCard = null; // 變成雙指手勢就不是點選
  }
});
svg.addEventListener('pointermove', e => {
  if(!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const cur = svgPos(e);
  if(Math.hypot(cur.x-prev.x, cur.y-prev.y) > 4) moved = true;
  if(pointers.size === 1){
    tx += cur.x - prev.x; ty += cur.y - prev.y; apply();
  }else if(pointers.size === 2){
    pointers.set(e.pointerId, cur);
    const [a,b] = [...pointers.values()];
    const nd = Math.hypot(a.x-b.x, a.y-b.y);
    if(pinchDist > 0) zoomAt((a.x+b.x)/2, (a.y+b.y)/2, nd/pinchDist);
    pinchDist = nd;
    return;
  }
  pointers.set(e.pointerId, cur);
});
function endPointer(e){
  // 沒有移動、起點在卡片上 → 視為點選
  if(e.type === 'pointerup' && pointers.has(e.pointerId) &&
     pointers.size === 1 && !moved && downCard){
    const rec = cardIndex.find(c => c.g === downCard);
    if(rec) select(rec.item, rec.group, rec.g);
  }
  pointers.delete(e.pointerId);
  pinchDist = 0;
  if(pointers.size === 0){ svg.classList.remove('dragging'); downCard = null; }
}
svg.addEventListener('pointerup', endPointer);
svg.addEventListener('pointercancel', endPointer);

document.getElementById('zin').onclick  = () => zoomAt(svg.clientWidth/2, svg.clientHeight/2, 1.35);
document.getElementById('zout').onclick = () => zoomAt(svg.clientWidth/2, svg.clientHeight/2, 1/1.35);
document.getElementById('zfit').onclick = fit;
window.addEventListener('resize', fit);

/* ── 搜尋與群組篩選 ── */
const searchBox = document.getElementById('search');
searchBox.addEventListener('input', applyFilter);
function applyFilter(){
  const q = searchBox.value.trim().toLowerCase();
  const qn = /^[\d.]+$/.test(q) ? parseFloat(q) : NaN; // 純數字才比對外徑 mm
  for(const c of cardIndex){
    let hit = !q;
    if(q){
      const hay = `${c.item.name} ${c.item.alias} ${c.item.desig} ${c.group.key} ${c.group.title}`.toLowerCase();
      hit = hay.includes(q);
      if(!hit && !isNaN(qn) && qn > 0) hit = Math.abs(c.item.od - qn) <= 1.2;
    }
    c.g.classList.toggle('dimmed', !hit);
  }
}

const chipBox = document.getElementById('chips');
for(const grp of GROUPS){
  grp.visible = true;
  const b = document.createElement('button');
  b.className = 'chip on';
  b.textContent = grp.key;
  b.style.background = grp.color;
  b.style.borderColor = grp.color;
  b.onclick = () => {
    grp.visible = !grp.visible;
    b.classList.toggle('on', grp.visible);
    b.style.background = grp.visible ? grp.color : '#fff';
    b.style.color = grp.visible ? '#fff' : '#64748b';
    render(); fit();
  };
  chipBox.appendChild(b);
}

/* ── 說明欄 ── */
const panelBody = document.getElementById('panelBody');
const tabs = document.querySelectorAll('.tabs button');
let curTab = 'spec', curItem = null, curGroup = null, curCard = null;
tabs.forEach(b => b.onclick = () => {
  curTab = b.dataset.tab;
  tabs.forEach(t => t.classList.toggle('on', t === b));
  renderPanel();
});
function select(item, grp, g){
  curItem = item; curGroup = grp;
  if(curCard) curCard.classList.remove('selected');
  curCard = g; g.classList.add('selected');
  curTab = 'spec';
  tabs.forEach(t => t.classList.toggle('on', t.dataset.tab === 'spec'));
  renderPanel();
}

/* ============================================================
   尺寸詳圖檢視器 —— 主角：牙型剖面詳圖(2D SVG，全尺寸標註)
   輔助：立體牙紋(canvas 軟體渲染)。零依賴。
   幾何常數（已對 M10×1.5→小徑8.16、PT½→18.63 驗證吻合，勿改）：
   牙角 55°(PT/PF Whitworth)／60°(NPT/M/UN)；牙深 h=0.6403P(55°)、0.6134P(60°)
   小徑=大徑−2h；理論三角高 H=P/(2·tan(角/2))；錐牙錐度1:16、單邊≈1°47′
   ============================================================ */
const STD = {PT:'ISO 7 / JIS B0203', PF:'ISO 228 / JIS B0202',
             NPT:'ASME B1.20.1', M:'ISO 261 / 262 / 68', UN:'ASME B1.1'};

function threadGeom(it, gp){
  const P = it.pitch;
  const alpha = (gp.key==='PT'||gp.key==='PF') ? 55 : 60;
  const H = P/(2*Math.tan(alpha*Math.PI/360));       // 理論三角高
  const h = (alpha===55 ? 0.6403 : 0.6134) * P;      // 實際牙深（截頂截底）
  const d = it.od, d1 = d - 2*h, d2 = d - h;
  const isTaper = /1:16/.test(it.taper);
  return {P, alpha, H, h, d, d1, d2, isTaper};
}
const r2 = n => (Math.round(n*100)/100).toString();   // 2 位小數
const r3 = n => (Math.round(n*1000)/1000).toString(); // 3 位小數

/* 牙型剖面詳圖：回傳 SVG 字串（純 SVG＝文字永遠清晰、可縮放、靜態免動畫） */
function buildProfileSVG(it, gp){
  const G = threadGeom(it, gp), P = G.P, alpha = G.alpha;
  const C = {dia:'#2563eb', pit:'#ea580c', form:'#16a34a', tap:'#9333ea',
             info:'#64748b', ink:'#1e293b', fill:'#eef2f7'};
  const pw = (s,sz)=>{ let u=0; for(const ch of String(s)) u += (ch.charCodeAt(0)<128?0.6:1.05); return u*sz+16; };
  const T = [];
  const L=(x1,y1,x2,y2,c,w,d,mk)=>`<line x1="${(+x1).toFixed(1)}" y1="${(+y1).toFixed(1)}" x2="${(+x2).toFixed(1)}" y2="${(+y2).toFixed(1)}" stroke="${c}" stroke-width="${w||2}"${d?` stroke-dasharray="${d}"`:''}${mk?` marker-start="url(#${mk})" marker-end="url(#${mk})"`:''}/>`;
  const TX=(x,y,s,sz,c,anc,bold)=>`<text x="${(+x).toFixed(1)}" y="${(+y).toFixed(1)}" font-size="${sz}" fill="${c}" text-anchor="${anc||'start'}"${bold?' font-weight="bold"':''}>${s}</text>`;
  const PILL=(x,y,s,sz,c)=>{ const w=pw(s,sz), hh=sz+12; return `<g><rect x="${(x-w/2).toFixed(1)}" y="${(y-hh/2).toFixed(1)}" width="${w.toFixed(1)}" height="${hh}" rx="6" fill="#ffffff" stroke="${c}" stroke-width="1.3"/><text x="${(+x).toFixed(1)}" y="${(y+sz*0.35).toFixed(1)}" font-size="${sz}" fill="${c}" text-anchor="middle" font-weight="bold">${s}</text></g>`; };

  T.push(`<svg viewBox="0 0 1000 740" xmlns="http://www.w3.org/2000/svg" font-family="'Microsoft JhengHei','Noto Sans TC',sans-serif">`);
  T.push(`<rect x="0" y="0" width="1000" height="740" fill="#ffffff"/>`);
  T.push(`<defs>`);
  for(const [id,c] of [['mdia',C.dia],['mpit',C.pit],['mfor',C.form]])
    T.push(`<marker id="${id}" markerWidth="11" markerHeight="9" refX="8.5" refY="4" orient="auto-start-reverse"><path d="M0,0 L9,4 L0,8 z" fill="${c}"/></marker>`);
  T.push(`</defs>`);
  T.push(TX(500,30,'牙型剖面詳圖　（放大示意，數字為實際尺寸 mm）',19,C.ink,'middle',true));

  /* ── 主視圖：縱向剖面（上下鏡射，垂直距離＝真直徑）── */
  const AX=225, halfV=86, depthV=30;
  const crestT=AX-halfV, rootT=crestT+depthV, rootB=AX+halfV-depthV, crestB=AX+halfV;
  const x0=170, tw=112, NT=4, xE=x0+tw*NT;
  const up=[];
  for(let i=0;i<NT;i++){ const b=x0+i*tw;
    up.push([b,rootT]); up.push([b+tw*0.12,rootT]); up.push([b+tw*0.38,crestT]);
    up.push([b+tw*0.62,crestT]); up.push([b+tw*0.88,rootT]); }
  up.push([xE,rootT]);
  const dn=up.map(([x,y])=>[x,2*AX-y]);
  const body='M'+up.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L')+' L'+dn.slice().reverse().map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L')+' Z';
  T.push(`<clipPath id="cclip"><path d="${body}"/></clipPath>`);
  T.push(`<path d="${body}" fill="${C.fill}"/>`);
  let hatch='';
  for(let hx=x0-200;hx<xE+40;hx+=15) hatch+=L(hx,crestT-12,hx+(crestB-crestT+24),crestB+12,'#cbd5e1',1);
  T.push(`<g clip-path="url(#cclip)">${hatch}</g>`);
  T.push(`<path d="${body}" fill="none" stroke="${C.ink}" stroke-width="2.5" stroke-linejoin="round"/>`);
  T.push(L(x0-70,AX,xE+270,AX,C.info,1.4,'22 5 4 5'));
  T.push(TX(x0-70,AX-7,'軸線（中心線）',14,C.info));

  // 牙距 P（橘，圖頂水平）
  const p1=x0+0.5*tw, p2=x0+1.5*tw, py=crestT-42;
  T.push(L(p1,crestT-4,p1,py-2,C.pit,1)); T.push(L(p2,crestT-4,p2,py-2,C.pit,1));
  T.push(L(p1,py,p2,py,C.pit,2,'','mpit'));
  T.push(PILL((p1+p2)/2,py-17,`牙距 P ${r3(P)}（${fmt(it.tpi)} TPI）`,18,C.pit));

  // 大徑（藍，最外側，跨牙峰↔牙峰）
  const cxL=x0+(NT-0.5)*tw, xMaj=xE+66;
  T.push(L(cxL,crestT,xMaj+6,crestT,C.dia,1)); T.push(L(cxL,crestB,xMaj+6,crestB,C.dia,1));
  T.push(L(xMaj,crestT,xMaj,crestB,C.dia,2,'','mdia'));
  T.push(PILL(xMaj,AX-26,`外徑 ⌀${r3(it.od)}`,18,C.dia));
  // 小徑（藍，內側，跨牙底↔牙底）
  const vx=x0+(NT-1)*tw, xMin=xE+150;
  T.push(L(vx,rootT,xMin+6,rootT,C.dia,1)); T.push(L(vx,rootB,xMin+6,rootB,C.dia,1));
  T.push(L(xMin,rootT,xMin,rootB,C.dia,2,'','mdia'));
  T.push(PILL(xMin,AX+26,`底徑 ⌀${r2(G.d1)}`,18,C.dia));

  // 底孔（灰）
  T.push(TX(x0,crestB+40, it.drill?`攻牙底孔　約 ⌀${r2(it.drill)} mm（內牙攻牙前鑽孔）`:'攻牙底孔　—（大口徑少攻牙）',15,C.info));
  // 錐度／平行 註記（主視圖下方，避免與頂部牙距標註打架）
  if(G.isTaper){
    T.push(TX(x0,crestB+70,'錐度 1:16（沿直徑）· 單邊 ≈1°47′（1.79°）· 前端漸細',15,C.tap,'start',true));
    const tx=x0, ty=crestB+92;
    T.push(L(tx,ty,tx+128,ty,C.tap,1.6)); T.push(L(tx+128,ty,tx+128,ty-8,C.tap,1.6)); T.push(L(tx,ty,tx+128,ty-8,C.tap,1.6));
    T.push(TX(tx+64,ty+14,'16',12,C.tap,'middle')); T.push(TX(tx+134,ty-3,'1',12,C.tap));
  } else {
    T.push(TX(x0,crestB+70,'平行牙 · 無錐度 · 牙峰線平行軸線',15,C.info,'start',true));
  }

  /* ── 牙型放大詳圖（真實牙角）── */
  T.push(TX(500,472,`牙型放大詳圖　（真實牙角 ${alpha}°）`,18,C.ink,'middle',true));
  const a2=alpha*Math.PI/360, Pd=210, hPx=(alpha===55?0.6403:0.6134)*Pd;
  const flankRun=hPx*Math.tan(a2), cf=Pd*0.14, rf=Pd-cf-2*flankRun;
  const rootY=680, crestY=rootY-hPx, X0d=280;
  const dp=[]; let x=X0d; dp.push([x,rootY]);
  for(let i=0;i<2;i++){ x+=rf/2; dp.push([x,rootY]); x+=flankRun; dp.push([x,crestY]); x+=cf; dp.push([x,crestY]); x+=flankRun; dp.push([x,rootY]); x+=rf/2; dp.push([x,rootY]); }
  const detEnd=x, detBaseY=rootY+50;
  const detBody='M'+dp.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L')+` L${detEnd.toFixed(1)},${detBaseY} L${X0d.toFixed(1)},${detBaseY} Z`;
  T.push(`<clipPath id="dclip"><path d="${detBody}"/></clipPath>`);
  T.push(`<path d="${detBody}" fill="${C.fill}"/>`);
  let dh=''; for(let hx=X0d-40;hx<detEnd;hx+=15) dh+=L(hx,crestY-6,hx+(detBaseY-crestY+12),detBaseY+6,'#cbd5e1',1);
  T.push(`<g clip-path="url(#dclip)">${dh}</g>`);
  T.push(`<path d="${detBody}" fill="none" stroke="${C.ink}" stroke-width="2.5" stroke-linejoin="round"/>`);
  T.push(L(X0d-54,crestY,detEnd+96,crestY,C.info,1,'6 5'));
  T.push(L(X0d-54,rootY,detEnd+96,rootY,C.info,1,'6 5'));
  T.push(TX(detEnd+100,crestY+4,'牙峰線',12,C.info)); T.push(TX(detEnd+100,rootY+4,'牙底線',12,C.info));

  // 牙角弧（綠，延伸兩側面至理論尖頂）
  const crest1c=X0d+rf/2+flankRun+cf/2, crest2c=crest1c+Pd;
  const apexY=crestY-(1/Math.tan(a2))*(cf/2), apexX=crest2c;
  const lEnd=crest2c-cf/2, rEnd=crest2c+cf/2;
  T.push(L(lEnd,crestY,apexX,apexY,C.form,1.4,'5 4')); T.push(L(rEnd,crestY,apexX,apexY,C.form,1.4,'5 4'));
  const rA=54, angL=Math.atan2(crestY-apexY,lEnd-apexX), angR=Math.atan2(crestY-apexY,rEnd-apexX);
  T.push(`<path d="M${(apexX+rA*Math.cos(angL)).toFixed(1)},${(apexY+rA*Math.sin(angL)).toFixed(1)} A${rA},${rA} 0 0 1 ${(apexX+rA*Math.cos(angR)).toFixed(1)},${(apexY+rA*Math.sin(angR)).toFixed(1)}" fill="none" stroke="${C.form}" stroke-width="2"/>`);
  T.push(TX(apexX,apexY-10,'牙角',14,C.form,'middle'));
  T.push(TX(apexX,apexY+rA+30,`${alpha}°`,30,C.form,'middle',true));

  // 牙深 h（綠，右側垂直）
  const xh=detEnd+50;
  T.push(L(detEnd-flankRun*0.4,crestY,xh+6,crestY,C.form,1)); T.push(L(detEnd,rootY,xh+6,rootY,C.form,1));
  T.push(L(xh,crestY,xh,rootY,C.form,2,'','mfor'));
  T.push(PILL(xh+2,(crestY+rootY)/2,`牙深 h ${r3(G.h)}`,15,C.form));
  // 虛線延伸至理論尖頂已示意 H；H 數值見下方尺寸表

  T.push(`</svg>`);
  return T.join('');
}

function buildHero(it, gp){
  const G = threadGeom(it, gp), metric = gp.key==='M';
  const cells = [
    ['外徑（大徑）', `⌀${r3(it.od)}`, 'mm'],
    ['牙距 P', `${r3(it.pitch)}`, metric?'mm（公制）':`mm · ${fmt(it.tpi)} TPI`],
    ['牙角', `${G.alpha}°`, G.alpha===55?'Whitworth':'ISO／UN'],
    ['攻牙底孔', it.drill?`約⌀${r2(it.drill)}`:'—', it.drill?'mm':'大口徑少攻牙'],
    ['牙型', G.isTaper?'錐牙':'平行牙', G.isTaper?'錐度 1:16':'直牙'],
  ];
  return cells.map(([l,v,s])=>`<div class="herocell"><div class="lab">${l}</div><div class="val">${v}</div><div class="sub">${s}</div></div>`).join('');
}

function buildDimTable(it, gp){
  const G = threadGeom(it, gp), metric = gp.key==='M';
  const rows = [
    ['外徑（大徑）d', `${r3(it.od)} mm（${it.odIn.toFixed(3)}"）`],
    ['底徑（小徑）d₁', `${r2(G.d1)} mm　＝ 大徑 − 2×牙深`],
    ['中徑（節徑）d₂', `${r2(G.d2)} mm（參考）`],
    ['牙距 P', metric?`${r3(it.pitch)} mm（公制以牙距標示）`:`${r3(it.pitch)} mm　＝ 25.4 ÷ ${fmt(it.tpi)}`],
    ['牙數', metric?`約 ${r2(it.tpi)} TPI（公制不以此標示）`:`${fmt(it.tpi)} TPI（每吋牙數）`],
    ['牙角 α', `${G.alpha}°（${G.alpha===55?'惠氏 Whitworth':'ISO／UN'}）`],
    ['牙深 h', `${r3(G.h)} mm　＝ ${G.alpha===55?'0.6403':'0.6134'}×P`],
    ['理論三角高 H', `${r3(G.H)} mm　＝ P/(2·tan(α/2))`],
    ['錐度', G.isTaper?'1:16（沿直徑）· 單邊 ≈1°47′':'平行牙 · 無錐度'],
    ['攻牙底孔', it.drill?`約 ⌀${r2(it.drill)} mm`:'—（大口徑少攻牙）'],
    ['正式標稱', it.desig],
    ['依據標準', STD[gp.key]||''],
  ];
  return `<tr><th colspan="2" style="background:${gp.color};color:#fff;font-size:14px">${it.name}　完整尺寸表</th></tr>` +
    rows.map(([k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join('');
}

const v3d = {
  wrap: document.getElementById('viewer3d'),
  canvas: document.getElementById('v3dcanvas'),
  ctx: document.getElementById('v3dcanvas').getContext('2d'),
  quads: [],
  rx: -0.5, ry: 0.5, zoom: 1, auto: true, timer: 0,
};

function buildMesh(it, gp){
  const R = it.od/2, p = it.pitch;
  const angDeg = (gp.key==='PT'||gp.key==='PF') ? 55 : 60;
  const h = (angDeg===55 ? 0.6403 : 0.6134) * p;   // 真實牙深（與剖面詳圖同源）
  const depth = h * 1.9;                            // 立體視覺放大（示意，非實際比例）
  const len = Math.max(R*2.6, p*6);
  const taperR = /1:16/.test(it.taper) ? 1/32 : 0;
  const NT = 80;                                    // 圓周分段（提高，螺旋不被抹平）
  const NZ = Math.min(200, Math.max(80, Math.round(len/p*20)));
  const pts = [], rr = [];
  for(let iz=0; iz<=NZ; iz++){
    const z = len*iz/NZ, Rb = R - taperR*(len - z), row = [], rrow = [];
    for(let itc=0; itc<=NT; itc++){
      const th = 2*Math.PI*itc/NT;
      let phase = (z/p - th/(2*Math.PI)) % 1; if(phase < 0) phase += 1;
      let t = Math.abs(phase*2 - 1); t = Math.min(1, Math.max(0, (t - 0.125)/0.75));
      const r = Rb - depth*(1 - t);
      row.push([z - len/2, r*Math.cos(th), r*Math.sin(th)]); rrow.push(r);
    }
    pts.push(row); rr.push(rrow);
  }
  // 假環境光遮蔽（AO）：牙峰亮、牙底暗，與視角無關——牙紋不再被抹平
  const rMax = R, rMin = R - depth;
  const norm = r => Math.min(1, Math.max(0, (r - rMin)/((rMax - rMin)||1)));
  const quads = [];
  for(let iz=0; iz<NZ; iz++) for(let itc=0; itc<NT; itc++){
    const occl = (norm(rr[iz][itc]) + norm(rr[iz+1][itc]) + norm(rr[iz+1][itc+1]) + norm(rr[iz][itc+1]))/4;
    quads.push({p:[pts[iz][itc], pts[iz+1][itc], pts[iz+1][itc+1], pts[iz][itc+1]], occl});
  }
  for(const [iz, dir] of [[0,-1],[NZ,1]]){
    const c = [pts[iz][0][0], 0, 0];
    for(let itc=0; itc<NT; itc++){
      const p1 = pts[iz][itc], p2 = pts[iz][itc+1];
      quads.push({p: dir<0 ? [c, p1, p2, p2] : [c, p2, p1, p1], occl:0.55});
    }
  }
  v3d.quads = quads;
  v3d.modelR = Math.hypot(len/2, R);
  const Gi = threadGeom(it, gp);
  v3d.info = {name:it.name, R:it.od/2, od:it.od, d1:Gi.d1, pitch:it.pitch, tpi:it.tpi,
              alpha:Gi.alpha, isTaper:Gi.isTaper, drill:it.drill, metric:gp.key==='M'};
}

function renderV3D(){
  const {ctx, canvas, quads} = v3d;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth, Hc = canvas.clientHeight;
  if(canvas.width !== W*dpr){ canvas.width = W*dpr; canvas.height = Hc*dpr; }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,Hc);
  if(!quads.length || W < 10) return;

  const s = Math.min(W, Hc)/(2.35*v3d.modelR)*v3d.zoom;
  const cx = W/2, cy = Hc/2;
  const cA = Math.cos(v3d.ry), sA = Math.sin(v3d.ry);
  const cB = Math.cos(v3d.rx), sB = Math.sin(v3d.rx);
  const rot = ([x,y,z]) => {
    const x1 = x*cA + z*sA, z1 = -x*sA + z*cA;      // 繞 y
    const y2 = y*cB - z1*sB, z2 = y*sB + z1*cB;     // 繞 x
    return [x1, y2, z2];
  };
  const light = [-0.303, -0.505, -0.808];           // 朝觀察者偏左上的光

  const drawn = [];
  for(const q of quads){
    const P = q.p;
    const a = rot(P[0]), b = rot(P[1]), c = rot(P[2]), d = rot(P[3]);
    // 法向量（兩邊外積），一律翻向觀察者（-z）再打光，避免內外面顛倒
    const u = [b[0]-a[0], b[1]-a[1], b[2]-a[2]];
    const v = [d[0]-a[0], d[1]-a[1], d[2]-a[2]];
    let n = [u[1]*v[2]-u[2]*v[1], u[2]*v[0]-u[0]*v[2], u[0]*v[1]-u[1]*v[0]];
    const nl = Math.hypot(n[0],n[1],n[2]) || 1;
    if(n[2] > 0){ n = [-n[0],-n[1],-n[2]]; }
    const lit = Math.max(0.15, (n[0]*light[0]+n[1]*light[1]+n[2]*light[2])/nl);
    const ao = 0.4 + 0.6*q.occl;                      // 牙峰亮牙底暗（與視角無關）
    const shade = lit * ao;
    drawn.push({pts:[a,b,c,d], z:(a[2]+b[2]+c[2]+d[2])/4, shade});
  }
  drawn.sort((p,q) => q.z - p.z);                    // 遠的先畫
  for(const f of drawn){
    const g = Math.round(34 + f.shade*205);
    ctx.fillStyle = `rgb(${g},${Math.round(g*1.03)},${Math.min(255,Math.round(g*1.1))})`;
    ctx.beginPath();
    ctx.moveTo(cx + f.pts[0][0]*s, cy + f.pts[0][1]*s);
    for(let i=1;i<4;i++) ctx.lineTo(cx + f.pts[i][0]*s, cy + f.pts[i][1]*s);
    ctx.closePath();
    ctx.fill();
  }
  drawV3DDims(ctx, rot, s, cx, cy, W, Hc);           // 尺寸標註疊加（隨模型旋轉）
}

/* 3D 疊加尺寸：直徑卡尺(隨模型轉)＋牙距卡尺＋左上資訊 HUD */
function v3dArrow(ctx, tx, ty, fromx, fromy, size, color){
  const a = Math.atan2(ty-fromy, tx-fromx);
  ctx.beginPath(); ctx.moveTo(tx, ty);
  ctx.lineTo(tx-size*Math.cos(a-0.42), ty-size*Math.sin(a-0.42));
  ctx.lineTo(tx-size*Math.cos(a+0.42), ty-size*Math.sin(a+0.42));
  ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}
function v3dPill(ctx, x, y, text, color){
  ctx.font = 'bold 14px "Microsoft JhengHei","Noto Sans TC",sans-serif';
  const w = ctx.measureText(text).width+16, h = 23, rx = x-w/2, ry = y-h/2;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(rx, ry, w, h, 6); else ctx.rect(rx, ry, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.96)'; ctx.fill();
  ctx.lineWidth = 1.4; ctx.strokeStyle = color; ctx.stroke();
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y+1); ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}
function drawV3DDims(ctx, rot, s, cx, cy, W, Hc){
  const I = v3d.info; if(!I) return;
  const ax = rot([1,0,0]); let dx = ax[0], dy = ax[1];
  const dl = Math.hypot(dx,dy);                        // 軸向（螢幕）
  if(dl < 0.1){ dx = 1; dy = 0; } else { dx/=dl; dy/=dl; } // 近端面視角時軸向退化，退回水平
  const px = -dy, py = dx, R = I.R*s;                  // 垂直軸向、投影半徑
  // 直徑卡尺（過中心、垂直軸線，隨模型轉）
  const e1x=cx+px*R, e1y=cy+py*R, e2x=cx-px*R, e2y=cy-py*R;
  ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(e1x,e1y); ctx.lineTo(e2x,e2y); ctx.stroke();
  v3dArrow(ctx,e1x,e1y,cx,cy,10,'#38bdf8'); v3dArrow(ctx,e2x,e2y,cx,cy,10,'#38bdf8');
  v3dPill(ctx, cx+px*(R+24), cy+py*(R+24), `⌀${r3(I.od)}`, '#0369a1');
  // 牙距卡尺（沿軸、貼另一側輪廓）
  const bx=cx-px*(R+20), by=cy-py*(R+20);
  const n = Math.max(1, Math.min(6, Math.round(70/Math.max(1, I.pitch*s))));
  const half = I.pitch*s*n/2;
  const q1x=bx-dx*half, q1y=by-dy*half, q2x=bx+dx*half, q2y=by+dy*half;
  ctx.strokeStyle = '#fb923c'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(q1x,q1y); ctx.lineTo(q2x,q2y); ctx.stroke();
  v3dArrow(ctx,q1x,q1y,q2x,q2y,9,'#fb923c'); v3dArrow(ctx,q2x,q2y,q1x,q1y,9,'#fb923c');
  v3dPill(ctx, bx-px*15, by-py*15, `牙距 ${r3(I.pitch)}${n>1?'×'+n:''}`, '#c2410c');
  // 資訊 HUD（左上，永遠可讀，畫最後蓋在最上）
  const lines = [
    `外徑 ⌀${r3(I.od)} mm`, `底徑 ⌀${r2(I.d1)} mm`,
    `牙距 ${r3(I.pitch)} mm${I.metric?'（公制）':` · ${fmt(I.tpi)}T`}`,
    `牙角 ${I.alpha}°`, I.isTaper?'錐度 1:16（錐牙）':'平行牙（直牙）',
    `底孔 ${I.drill?'約⌀'+r2(I.drill):'—'}`,
  ];
  ctx.font = '13px "Microsoft JhengHei","Noto Sans TC",sans-serif';
  let bw = 0; for(const l of lines) bw = Math.max(bw, ctx.measureText(l).width);
  bw += 24; const bh = lines.length*20+34, bx0 = 12, by0 = 12;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(bx0, by0, bw, bh, 10); else ctx.rect(bx0, by0, bw, bh);
  ctx.fillStyle = 'rgba(15,23,42,0.82)'; ctx.fill();
  ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(148,163,184,0.5)'; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px "Microsoft JhengHei","Noto Sans TC",sans-serif';
  ctx.fillText(I.name+' 尺寸', bx0+12, by0+22);
  ctx.font = '13px "Microsoft JhengHei","Noto Sans TC",sans-serif';
  lines.forEach((l,i)=>{ ctx.fillStyle = i===3 ? '#7dd3fc' : '#e2e8f0'; ctx.fillText(l, bx0+12, by0+44+i*20); });
}

// 用 setInterval 而非 requestAnimationFrame：部分內嵌/背景環境 rAF 不觸發（見 lessons）
function stepV3D(){
  if(v3d.auto) v3d.ry += 0.012;
  renderV3D();
}

window.open3D = function(){
  if(!curItem) return;
  const it = curItem, gp = curGroup;
  document.getElementById('v3dtitle').textContent = it.name;
  const tag = document.getElementById('v3dtag');
  tag.textContent = it.alias || gp.key; tag.style.background = gp.color;
  document.getElementById('v3dinfo').textContent = `${it.desig}｜精確尺寸見下方剖面詳圖`;
  document.getElementById('v3dhero').innerHTML = buildHero(it, gp);
  document.getElementById('v3dprofile').innerHTML = buildProfileSVG(it, gp);
  document.getElementById('v3dtable').innerHTML = buildDimTable(it, gp);
  v3d.wrap.classList.add('open');
  setView('profile');                              // 預設先顯示剖面詳圖
};

// 切換「剖面詳圖／立體牙紋」；3D 迴圈只在立體檢視時跑（省電、避免背景空轉）
function setView(v){
  const prof = document.getElementById('v3dprofilewrap');
  const sol  = document.getElementById('v3dsolid');
  document.querySelectorAll('#v3dviews button').forEach(b => {
    const on = b.dataset.view === v;
    b.classList.toggle('on', on);
    b.style.background = on ? (curGroup ? curGroup.color : '#0e7490') : '#fff';
    b.style.color = on ? '#fff' : '#334155';
    b.style.borderColor = on ? (curGroup ? curGroup.color : '#0e7490') : '#cbd5e1';
  });
  if(v === 'solid'){
    prof.style.display = 'none'; sol.style.display = 'block';
    document.getElementById('v3dsolidnote').textContent =
      '立體示意 · 牙紋已放大；直徑／牙距卡尺隨模型旋轉，左上角尺寸表永遠可讀（精確值以剖面詳圖為準）';
    buildMesh(curItem, curGroup);
    v3d.rx = -0.5; v3d.ry = 0.5; v3d.zoom = 1; v3d.auto = true;
    clearInterval(v3d.timer);
    v3d.timer = setInterval(stepV3D, 33);
    stepV3D();
  } else {
    sol.style.display = 'none'; prof.style.display = 'block';
    clearInterval(v3d.timer);
  }
}
document.querySelectorAll('#v3dviews button').forEach(b => b.onclick = () => setView(b.dataset.view));
document.getElementById('v3dclose').onclick = () => {
  v3d.wrap.classList.remove('open');
  clearInterval(v3d.timer);
};

// 3D 畫布互動：拖曳旋轉、滾輪/雙指縮放
{
  const cv = v3d.canvas, ps = new Map();
  let pinch = 0;
  cv.addEventListener('pointerdown', e => {
    try{ cv.setPointerCapture(e.pointerId); }catch(_){}
    ps.set(e.pointerId, {x:e.clientX, y:e.clientY});
    v3d.auto = false;
    if(ps.size === 2){
      const [a,b] = [...ps.values()];
      pinch = Math.hypot(a.x-b.x, a.y-b.y);
    }
  });
  cv.addEventListener('pointermove', e => {
    if(!ps.has(e.pointerId)) return;
    const prev = ps.get(e.pointerId), cur = {x:e.clientX, y:e.clientY};
    ps.set(e.pointerId, cur);
    if(ps.size === 1){
      v3d.ry += (cur.x - prev.x)*0.008;
      v3d.rx += (cur.y - prev.y)*0.008;
      v3d.rx = Math.max(-1.5, Math.min(1.5, v3d.rx));
    }else if(ps.size === 2){
      const [a,b] = [...ps.values()];
      const nd = Math.hypot(a.x-b.x, a.y-b.y);
      if(pinch > 0) v3d.zoom = Math.min(6, Math.max(0.3, v3d.zoom*nd/pinch));
      pinch = nd;
    }
  });
  const up = e => { ps.delete(e.pointerId); pinch = 0; if(ps.size===0) v3d.auto = true; };
  cv.addEventListener('pointerup', up);
  cv.addEventListener('pointercancel', up);
  cv.addEventListener('wheel', e => {
    e.preventDefault();
    v3d.zoom = Math.min(6, Math.max(0.3, v3d.zoom*Math.exp(-e.deltaY*0.0015)));
  }, {passive:false});
}

/* ── 啟動 ── */
render();
fit();
renderPanel();
